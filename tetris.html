<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASCII Тетрис</title>
  <style>
    body {
      font-family: sans-serif; max-width: 600px; margin: 2rem auto; padding: 0 1rem;
      background: #fff; color: #111;
    }
    h2 { font-size: 15px; font-weight: 500; margin: 0 0 .75rem; }
    a { color: #2563eb; font-size: 13px; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .section {
      background: #f9f9f9; border: 1px solid #eee; border-radius: 8px;
      padding: 1rem 1.25rem; margin-bottom: 1.25rem;
    }
    .game-wrap { display: flex; gap: 1.25rem; align-items: flex-start; flex-wrap: wrap; }
    pre {
      background: #111; color: #e6e6e6; padding: 12px 14px; border-radius: 6px;
      font-family: "Courier New", monospace; font-size: 16px; line-height: 1.05;
      letter-spacing: 1px; margin: 0; white-space: pre; user-select: none;
    }
    .side { font-size: 13px; color: #333; min-width: 150px; }
    .side h3 { font-size: 13px; font-weight: 600; margin: 0 0 .35rem; }
    .stat { margin-bottom: .75rem; }
    .stat b { font-size: 18px; }
    .next-box {
      background: #111; color: #e6e6e6; padding: 8px 10px; border-radius: 6px;
      font-family: "Courier New", monospace; font-size: 15px; line-height: 1.05;
      white-space: pre; display: inline-block; margin-bottom: .75rem;
    }
    button {
      padding: 7px 13px; font-size: 13px; border: 1px solid #ccc; border-radius: 6px;
      background: #fff; cursor: pointer; white-space: nowrap; margin-bottom: 6px;
    }
    button:hover { background: #f5f5f5; }
    button.full { width: 100%; }
    .keys { font-size: 12px; color: #666; line-height: 1.7; margin-top: .5rem; }
    .keys kbd {
      background: #eee; border: 1px solid #ccc; border-radius: 4px;
      padding: 1px 6px; font-family: monospace; font-size: 11px;
    }
    .overlay-msg { font-size: 13px; color: #c0392b; min-height: 18px; margin: .5rem 0 0; font-weight: 600; }
  </style>
</head>
<body>

<p style="display:flex; justify-content:space-between; align-items:center;">
  <a href="/">← На главную</a>
  <span>
    <a href="/editor">Редактор маршрутизации</a>
    <a href="/logout" style="margin-left:14px;">Выход</a>
  </span>
</p>

<div class="section">
  <h2>ASCII Тетрис</h2>
  <div class="game-wrap">
    <pre id="board"></pre>
    <div class="side">
      <div class="stat">Очки<br><b id="score">0</b></div>
      <div class="stat">Линии<br><b id="lines">0</b></div>
      <div class="stat">Уровень<br><b id="level">1</b></div>
      <h3>Следующая</h3>
      <div class="next-box" id="next"></div>
      <button class="full" id="start-btn" onclick="startGame()">Старт</button>
      <button class="full" onclick="togglePause()">Пауза (P)</button>
      <p class="overlay-msg" id="msg"></p>
      <div class="keys">
        <kbd>←</kbd> <kbd>→</kbd> движение<br>
        <kbd>↑</kbd> поворот<br>
        <kbd>↓</kbd> ускорить<br>
        <kbd>Space</kbd> сбросить<br>
        <kbd>P</kbd> пауза
      </div>
    </div>
  </div>
</div>

<script>
const COLS = 10;
const ROWS = 20;
const EMPTY = '.';
const BLOCK = '[]';   // два символа на ячейку, чтобы клетки были квадратнее
const VOID  = ' .';

// Тетромино: список вращений, каждое — список координат [r, c]
const SHAPES = {
  I: [[[0,0],[0,1],[0,2],[0,3]], [[0,1],[1,1],[2,1],[3,1]]],
  O: [[[0,0],[0,1],[1,0],[1,1]]],
  T: [[[0,1],[1,0],[1,1],[1,2]], [[0,1],[1,1],[1,2],[2,1]],
      [[1,0],[1,1],[1,2],[2,1]], [[0,1],[1,0],[1,1],[2,1]]],
  S: [[[0,1],[0,2],[1,0],[1,1]], [[0,1],[1,1],[1,2],[2,2]]],
  Z: [[[0,0],[0,1],[1,1],[1,2]], [[0,2],[1,1],[1,2],[2,1]]],
  J: [[[0,0],[1,0],[1,1],[1,2]], [[0,1],[0,2],[1,1],[2,1]],
      [[1,0],[1,1],[1,2],[2,2]], [[0,1],[1,1],[2,0],[2,1]]],
  L: [[[0,2],[1,0],[1,1],[1,2]], [[0,1],[1,1],[2,1],[2,2]],
      [[1,0],[1,1],[1,2],[2,0]], [[0,0],[0,1],[1,1],[2,1]]],
};
const TYPES = Object.keys(SHAPES);

let grid, cur, score, lines, level, dropMs, timer, running, paused, nextType;

function newGrid() {
  return Array.from({length: ROWS}, () => Array(COLS).fill(0));
}

function randType() {
  return TYPES[Math.floor(Math.random() * TYPES.length)];
}

function spawn() {
  const type = nextType || randType();
  nextType = randType();
  const startCol = Math.floor((COLS - 4) / 2);
  cur = { type, rot: 0, r: 0, c: startCol };
  if (collides(cur)) {       // нет места — конец игры
    gameOver();
    return false;
  }
  renderNext();
  return true;
}

function cells(piece) {
  const rots = SHAPES[piece.type];
  return rots[piece.rot % rots.length].map(([r, c]) => [piece.r + r, piece.c + c]);
}

function collides(piece) {
  return cells(piece).some(([r, c]) =>
    c < 0 || c >= COLS || r >= ROWS || (r >= 0 && grid[r][c]));
}

function lock() {
  cells(cur).forEach(([r, c]) => { if (r >= 0) grid[r][c] = 1; });
  clearLines();
  spawn();
}

function clearLines() {
  let cleared = 0;
  for (let r = ROWS - 1; r >= 0; r--) {
    if (grid[r].every(v => v)) {
      grid.splice(r, 1);
      grid.unshift(Array(COLS).fill(0));
      cleared++;
      r++; // проверить ту же строку снова
    }
  }
  if (cleared) {
    const points = [0, 100, 300, 500, 800][cleared] * level;
    score += points;
    lines += cleared;
    level = Math.floor(lines / 10) + 1;
    dropMs = Math.max(80, 600 - (level - 1) * 50);
    if (running && !paused) restartTimer();
    updateStats();
  }
}

function move(dr, dc) {
  const next = { ...cur, r: cur.r + dr, c: cur.c + dc };
  if (!collides(next)) { cur = next; render(); return true; }
  return false;
}

function rotate() {
  const next = { ...cur, rot: (cur.rot + 1) % SHAPES[cur.type].length };
  // простой wall-kick: пробуем сдвиги
  for (const dc of [0, -1, 1, -2, 2]) {
    const t = { ...next, c: next.c + dc };
    if (!collides(t)) { cur = t; render(); return; }
  }
}

function softDrop() {
  if (!move(1, 0)) lock();
}

function hardDrop() {
  while (move(1, 0)) score += 1;
  updateStats();
  lock();
}

function tick() {
  if (!move(1, 0)) lock();
  render();
}

function render() {
  // копия сетки + текущая фигура
  const view = grid.map(row => row.slice());
  if (cur) cells(cur).forEach(([r, c]) => { if (r >= 0 && r < ROWS) view[r][c] = 2; });

  const top = '+' + '--'.repeat(COLS) + '+';
  const rows = view.map(row =>
    '|' + row.map(v => v ? BLOCK : VOID).join('') + '|');
  document.getElementById('board').textContent = [top, ...rows, top].join('\n');
}

function renderNext() {
  const rots = SHAPES[nextType][0];
  const g = Array.from({length: 2}, () => Array(4).fill(0));
  rots.forEach(([r, c]) => { if (r < 2 && c < 4) g[r][c] = 1; });
  document.getElementById('next').textContent =
    g.map(row => row.map(v => v ? BLOCK : VOID).join('')).join('\n');
}

function updateStats() {
  document.getElementById('score').textContent = score;
  document.getElementById('lines').textContent = lines;
  document.getElementById('level').textContent = level;
}

function restartTimer() {
  clearInterval(timer);
  timer = setInterval(tick, dropMs);
}

function startGame() {
  clearInterval(timer);
  grid = newGrid();
  score = 0; lines = 0; level = 1; dropMs = 600;
  running = true; paused = false;
  nextType = randType();
  document.getElementById('msg').textContent = '';
  document.getElementById('start-btn').textContent = 'Заново';
  updateStats();
  spawn();
  render();
  restartTimer();
}

function togglePause() {
  if (!running) return;
  paused = !paused;
  if (paused) {
    clearInterval(timer);
    document.getElementById('msg').textContent = 'Пауза';
  } else {
    document.getElementById('msg').textContent = '';
    restartTimer();
  }
}

function gameOver() {
  running = false;
  clearInterval(timer);
  document.getElementById('msg').textContent = 'Игра окончена! Очки: ' + score;
  document.getElementById('start-btn').textContent = 'Старт';
}

document.addEventListener('keydown', (e) => {
  if (!running || paused) {
    if (e.key === 'p' || e.key === 'P') togglePause();
    return;
  }
  switch (e.key) {
    case 'ArrowLeft':  move(0, -1); break;
    case 'ArrowRight': move(0, 1); break;
    case 'ArrowDown':  softDrop(); render(); break;
    case 'ArrowUp':    rotate(); break;
    case ' ':          hardDrop(); render(); break;
    case 'p': case 'P': togglePause(); return;
    default: return;
  }
  // не даём странице скроллиться от стрелок/пробела
  if ([' ', 'ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown'].includes(e.key)) {
    e.preventDefault();
  }
});

// первичная отрисовка пустого поля
grid = newGrid();
nextType = randType();
render();
renderNext();
updateStats();
</script>
</body>
</html>

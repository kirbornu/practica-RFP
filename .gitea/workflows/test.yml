# Быстрый фидбэк: юнит + API тесты на каждый пуш в ветку и на каждый PR.
# Прод-пайплайн (deploy.yml) для master гоняет тесты отдельно как gate —
# поэтому здесь master исключён, чтобы не дублировать прогон.
name: tests

on:
  pull_request:
  push:
    branches-ignore:
      - master

jobs:
  test:
    # Метка нашей Debian-ВМ, зарегистрированной как Gitea Actions runner
    # с доступом к Docker. См. TESTING.md → «Настройка Debian-ВМ как раннера».
    runs-on: tests
    # Джоб выполняется ВНУТРИ контейнера с готовым Python — на самой ВМ
    # ставить python/pip не нужно (это обходит «externally-managed» Debian).
    # Полный образ python:3.11 уже содержит git (нужен checkout) и pip.
    container: nikolaik/python-nodejs:python3.11-nodejs20
    steps:
      - name: Клонировать код
        uses: actions/checkout@v4

      - name: Установить зависимости
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Юнит + API тесты
        # -m "not smoke" исключает smoke-тесты: тут нет развёрнутого прода.
        run: pytest -m "not smoke" -v

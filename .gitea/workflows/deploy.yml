name: build-and-deploy
on:
  push:
    branches:
      - master
    paths-ignore:
      - 'volume/**'
      - '.gitea/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clone Source Code
        uses: actions/checkout@v4

      - name: Build Image
        run: docker build -t 192.0.2.40:5000/prct-site:latest .
        
      - name: Push Image
        run: docker push 192.0.2.40:5000/prct-site:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Clone Source Code
        uses: actions/checkout@v4

      - name: Copy Stack Files
        run: |
          scp docker-compose.yml deployuser@192.0.2.20:/opt/prct-site/

      - name: Deploy Stack
        run: |
          ssh deployuser@192.0.2.20 "
            cd /opt/prct-site &&
            docker compose pull &&
            docker compose up -d --remove-orphans
          "
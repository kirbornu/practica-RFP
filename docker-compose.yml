# Прод-стек: приложение (gunicorn) + Redis (сессии).
#
# На хосте рядом с этим файлом должны лежать:
#   .env              — секреты (SECRET_KEY, SITE_ADDRESS, первый админ)
#   config.json, users.json, wpad_.dat — данные приложения (bind-mount)
#
# Запуск:  docker compose pull && docker compose up -d

services:
  app:
    image: 192.0.2.40:5000/prct-site:latest
    restart: unless-stopped
    environment:
      # Подпись cookie-сессий — обязателен, задаётся в .env.
      SECRET_KEY: ${SECRET_KEY}
      # Серверные сессии в Redis (сервис ниже, имя хоста = имя сервиса).
      REDIS_URL: redis://redis:6379/0
      CONFIG_FILE: /app/config.json
      USERS_FILE: /app/users.json
      COOKIE_SECURE: "false"
      # Первый пользователь создаётся из этих переменных при пустом users.json.
      INITIAL_ADMIN: ${INITIAL_ADMIN:-}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD:-}
    volumes:
      - /opt/prct-site/wpad_.dat:/app/wpad_.dat
      - /opt/prct-site/config.json:/app/config.json
      - /opt/prct-site/users.json:/app/users.json
    depends_on:
      redis:
        condition: service_healthy
    ports:
      # Приватный вход: авторизация + редактор + тетрис.
      - "8080:5000"
      # Публичный вход: без авторизации, доступен только тетрис.
      - "8090:5001"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # Включаем персистентность, чтобы сессии переживали рестарт контейнера.
    command: ["redis-server", "--save", "60", "1", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  redis-data:

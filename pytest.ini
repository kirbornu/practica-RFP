# Конфигурация pytest.
[pytest]
# Где искать тесты.
testpaths = tests
# Показывать краткую сводку по всем НЕуспешным/пропущенным (f=failed, s=skipped).
addopts = -ra
# Заглушаем «шумные» предупреждения о зависимостях, чтобы вывод был чистым.
filterwarnings =
    ignore::DeprecationWarning
# Регистрируем свои маркеры, чтобы pytest не предупреждал о «неизвестном» маркере.
markers =
    smoke: тесты по живому развёрнутому проду (нужен SMOKE_BASE_URL)
